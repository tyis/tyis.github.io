<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" fill="url(#bg3)" rx="12"/>
  <text x="400" y="35" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="16" font-weight="700">IT Asset Lifecycle Management</text>
  <!-- Lifecycle arrows -->
  <!-- Step 1: Procurement -->
  <rect x="30" y="65" width="120" height="70" rx="10" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="90" y="95" text-anchor="middle" fill="#38bdf8" font-family="sans-serif" font-size="20">&#x1F4E6;</text>
  <text x="90" y="120" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="11" font-weight="600">導入・調達</text>
  <line x1="155" y1="100" x2="180" y2="100" stroke="#475569" stroke-width="2"/>
  <polygon points="178,95 188,100 178,105" fill="#475569"/>
  <!-- Step 2: Operation -->
  <rect x="185" y="65" width="120" height="70" rx="10" fill="#1e293b" stroke="#818cf8" stroke-width="1.5"/>
  <text x="245" y="95" text-anchor="middle" fill="#818cf8" font-family="sans-serif" font-size="20">&#x2699;</text>
  <text x="245" y="120" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="11" font-weight="600">運用・管理</text>
  <line x1="310" y1="100" x2="335" y2="100" stroke="#475569" stroke-width="2"/>
  <polygon points="333,95 343,100 333,105" fill="#475569"/>
  <!-- Step 3: Maintenance -->
  <rect x="340" y="65" width="120" height="70" rx="10" fill="#1e293b" stroke="#c084fc" stroke-width="1.5"/>
  <text x="400" y="95" text-anchor="middle" fill="#c084fc" font-family="sans-serif" font-size="20">&#x1F527;</text>
  <text x="400" y="120" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="11" font-weight="600">保守・更新</text>
  <line x1="465" y1="100" x2="490" y2="100" stroke="#475569" stroke-width="2"/>
  <polygon points="488,95 498,100 488,105" fill="#475569"/>
  <!-- Step 4: Erasure -->
  <rect x="495" y="65" width="120" height="70" rx="10" fill="#1e293b" stroke="#f87171" stroke-width="1.5"/>
  <text x="555" y="95" text-anchor="middle" fill="#f87171" font-family="sans-serif" font-size="20">&#x1F6E1;</text>
  <text x="555" y="120" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="11" font-weight="600">データ消去</text>
  <line x1="620" y1="100" x2="645" y2="100" stroke="#475569" stroke-width="2"/>
  <polygon points="643,95 653,100 643,105" fill="#475569"/>
  <!-- Step 5: Recycle -->
  <rect x="650" y="65" width="120" height="70" rx="10" fill="#1e293b" stroke="#34d399" stroke-width="1.5"/>
  <text x="710" y="95" text-anchor="middle" fill="#34d399" font-family="sans-serif" font-size="20">&#x267B;</text>
  <text x="710" y="120" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="11" font-weight="600">買取・再利用</text>
  <!-- Service mapping -->
  <rect x="80" y="170" width="200" height="100" rx="10" fill="#1e293b" stroke="#38bdf8" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="180" y="195" text-anchor="middle" fill="#38bdf8" font-family="sans-serif" font-size="12" font-weight="700">TOYO ITコンサルティング</text>
  <text x="180" y="215" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="10">tyis.co.jp</text>
  <text x="95" y="237" fill="#94a3b8" font-family="sans-serif" font-size="10">&#x2022; インフラ設計・構築</text>
  <text x="95" y="253" fill="#94a3b8" font-family="sans-serif" font-size="10">&#x2022; MSP運用・監視</text>
  <rect x="300" y="170" width="200" height="100" rx="10" fill="#1e293b" stroke="#f87171" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="400" y="195" text-anchor="middle" fill="#f87171" font-family="sans-serif" font-size="12" font-weight="700">TOYO電子記録抹消</text>
  <text x="400" y="215" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="10">erasure.tyis.co.jp</text>
  <text x="315" y="237" fill="#94a3b8" font-family="sans-serif" font-size="10">&#x2022; 完全データ消去</text>
  <text x="315" y="253" fill="#94a3b8" font-family="sans-serif" font-size="10">&#x2022; 物理破壊・証明書発行</text>
  <rect x="520" y="170" width="200" height="100" rx="10" fill="#1e293b" stroke="#34d399" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="620" y="195" text-anchor="middle" fill="#34d399" font-family="sans-serif" font-size="12" font-weight="700">リサイクルポケット</text>
  <text x="620" y="215" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="10">recyclepocket.com</text>
  <text x="535" y="237" fill="#94a3b8" font-family="sans-serif" font-size="10">&#x2022; IT機器買取</text>
  <text x="535" y="253" fill="#94a3b8" font-family="sans-serif" font-size="10">&#x2022; リサイクル・再資源化</text>
</svg>
