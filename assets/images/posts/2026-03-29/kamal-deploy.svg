<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360">
  <defs>
    <linearGradient id="kamal-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
  </defs>
  <rect width="800" height="360" fill="url(#kamal-bg)" rx="12"/>
  <text x="400" y="35" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="16" font-weight="700">Kamal Multi-App Deployment Architecture</text>

  <!-- Developer -->
  <rect x="40" y="70" width="160" height="60" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="120" y="95" text-anchor="middle" fill="#fbbf24" font-family="sans-serif" font-size="12" font-weight="700">Developer</text>
  <text x="120" y="113" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="10">kamal deploy</text>

  <!-- Arrow Dev -> Registry -->
  <line x1="200" y1="100" x2="290" y2="100" stroke="#475569" stroke-width="2"/>
  <polygon points="288,94 298,100 288,106" fill="#475569"/>
  <text x="245" y="92" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="9">push image</text>

  <!-- Docker Hub -->
  <rect x="290" y="70" width="220" height="60" rx="10" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
  <circle cx="330" cy="100" r="16" fill="#38bdf8" fill-opacity="0.15" stroke="#38bdf8" stroke-width="1"/>
  <text x="330" y="105" text-anchor="middle" fill="#38bdf8" font-family="monospace" font-size="12" font-weight="700">D</text>
  <text x="380" y="95" fill="#e2e8f0" font-family="sans-serif" font-size="13" font-weight="700">Docker Hub Registry</text>
  <text x="380" y="113" fill="#94a3b8" font-family="sans-serif" font-size="10">myorg/app1, myorg/app2</text>

  <!-- Arrow Registry -> Server -->
  <line x1="510" y1="100" x2="600" y2="100" stroke="#475569" stroke-width="2"/>
  <polygon points="598,94 608,100 598,106" fill="#475569"/>
  <text x="555" y="92" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="9">pull image</text>

  <!-- Server frame -->
  <rect x="600" y="70" width="160" height="60" rx="10" fill="#1e293b" stroke="#34d399" stroke-width="1.5"/>
  <text x="680" y="95" text-anchor="middle" fill="#34d399" font-family="sans-serif" font-size="12" font-weight="700">Production Server</text>
  <text x="680" y="113" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="10">SSH (root)</text>

  <!-- Arrow down to inner server -->
  <line x1="680" y1="130" x2="680" y2="155" stroke="#475569" stroke-width="2"/>
  <polygon points="674,153 680,163 686,153" fill="#475569"/>

  <!-- Server box -->
  <rect x="60" y="160" width="700" height="170" rx="12" fill="#0f172a" stroke="#34d399" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="80" y="183" fill="#34d399" font-family="sans-serif" font-size="11" font-weight="700">1 Server (Docker host)</text>

  <!-- kamal-proxy -->
  <rect x="280" y="200" width="260" height="50" rx="10" fill="#1e293b" stroke="#f87171" stroke-width="1.5"/>
  <circle cx="320" cy="225" r="14" fill="#f87171" fill-opacity="0.15" stroke="#f87171" stroke-width="1"/>
  <text x="320" y="230" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="11" font-weight="700">P</text>
  <text x="370" y="222" fill="#e2e8f0" font-family="sans-serif" font-size="12" font-weight="700">kamal-proxy</text>
  <text x="370" y="240" fill="#94a3b8" font-family="sans-serif" font-size="10">Port 80/443 | TLS | Routing</text>

  <!-- Arrows from proxy to apps -->
  <line x1="340" y1="250" x2="170" y2="275" stroke="#475569" stroke-width="1.5"/>
  <polygon points="172,269 162,278 175,281" fill="#475569"/>
  <line x1="410" y1="250" x2="410" y2="275" stroke="#475569" stroke-width="1.5"/>
  <polygon points="404,273 410,283 416,273" fill="#475569"/>
  <line x1="480" y1="250" x2="650" y2="275" stroke="#475569" stroke-width="1.5"/>
  <polygon points="645,281 658,278 648,269" fill="#475569"/>

  <!-- Rails App 1 -->
  <rect x="80" y="278" width="180" height="42" rx="8" fill="#1e293b" stroke="#dc2626" stroke-width="1.2"/>
  <text x="170" y="295" text-anchor="middle" fill="#dc2626" font-family="sans-serif" font-size="11" font-weight="700">Rails App 1</text>
  <text x="170" y="310" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="9">app1.example.com</text>

  <!-- Rails App 2 -->
  <rect x="320" y="278" width="180" height="42" rx="8" fill="#1e293b" stroke="#dc2626" stroke-width="1.2"/>
  <text x="410" y="295" text-anchor="middle" fill="#dc2626" font-family="sans-serif" font-size="11" font-weight="700">Rails App 2</text>
  <text x="410" y="310" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="9">app2.example.com</text>

  <!-- PostgreSQL accessory -->
  <rect x="560" y="278" width="180" height="42" rx="8" fill="#1e293b" stroke="#818cf8" stroke-width="1.2"/>
  <text x="650" y="295" text-anchor="middle" fill="#818cf8" font-family="sans-serif" font-size="11" font-weight="700">PostgreSQL</text>
  <text x="650" y="310" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="9">accessory | port 5432</text>

  <!-- Footer -->
  <text x="400" y="350" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="10">Kamal 2 | Docker | Rails 8</text>
</svg>
