<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>
  <!-- On-Premises -->
  <rect x="60" y="80" width="240" height="240" rx="16" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="180" y="120" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="14" font-weight="600">ON-PREMISES</text>
  <!-- Server racks -->
  <rect x="90" y="140" width="50" height="80" rx="4" fill="#334155" stroke="#475569" stroke-width="1"/>
  <rect x="95" y="148" width="40" height="6" rx="2" fill="#38bdf8" opacity="0.6"/>
  <rect x="95" y="160" width="40" height="6" rx="2" fill="#38bdf8" opacity="0.6"/>
  <rect x="95" y="172" width="40" height="6" rx="2" fill="#38bdf8" opacity="0.6"/>
  <rect x="95" y="184" width="40" height="6" rx="2" fill="#38bdf8" opacity="0.4"/>
  <rect x="155" y="140" width="50" height="80" rx="4" fill="#334155" stroke="#475569" stroke-width="1"/>
  <rect x="160" y="148" width="40" height="6" rx="2" fill="#38bdf8" opacity="0.6"/>
  <rect x="160" y="160" width="40" height="6" rx="2" fill="#38bdf8" opacity="0.6"/>
  <rect x="160" y="172" width="40" height="6" rx="2" fill="#38bdf8" opacity="0.6"/>
  <rect x="160" y="184" width="40" height="6" rx="2" fill="#38bdf8" opacity="0.4"/>
  <rect x="220" y="140" width="50" height="80" rx="4" fill="#334155" stroke="#475569" stroke-width="1"/>
  <rect x="225" y="148" width="40" height="6" rx="2" fill="#38bdf8" opacity="0.6"/>
  <rect x="225" y="160" width="40" height="6" rx="2" fill="#38bdf8" opacity="0.6"/>
  <rect x="225" y="172" width="40" height="6" rx="2" fill="#38bdf8" opacity="0.6"/>
  <rect x="225" y="184" width="40" height="6" rx="2" fill="#38bdf8" opacity="0.4"/>
  <!-- Issues -->
  <text x="100" y="250" fill="#f87171" font-family="sans-serif" font-size="11">&#x26A0; High Cost</text>
  <text x="100" y="268" fill="#f87171" font-family="sans-serif" font-size="11">&#x26A0; Maintenance</text>
  <text x="100" y="286" fill="#f87171" font-family="sans-serif" font-size="11">&#x26A0; Low Scalability</text>
  <!-- Arrow -->
  <line x1="320" y1="200" x2="460" y2="200" stroke="url(#accent)" stroke-width="3" stroke-dasharray="8,4"/>
  <polygon points="460,192 480,200 460,208" fill="#38bdf8"/>
  <text x="400" y="185" text-anchor="middle" fill="#38bdf8" font-family="sans-serif" font-size="13" font-weight="700">MIGRATE</text>
  <!-- Cloud -->
  <rect x="500" y="80" width="240" height="240" rx="16" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="620" y="120" text-anchor="middle" fill="#38bdf8" font-family="sans-serif" font-size="14" font-weight="600">CLOUD</text>
  <!-- Cloud icon -->
  <ellipse cx="595" cy="175" rx="50" ry="30" fill="#334155" stroke="#38bdf8" stroke-width="1.2" opacity="0.8"/>
  <ellipse cx="570" cy="185" rx="30" ry="22" fill="#334155" stroke="#38bdf8" stroke-width="1.2" opacity="0.8"/>
  <ellipse cx="625" cy="183" rx="28" ry="20" fill="#334155" stroke="#38bdf8" stroke-width="1.2" opacity="0.8"/>
  <rect x="555" y="175" width="80" height="30" fill="#334155"/>
  <text x="595" y="195" text-anchor="middle" fill="#38bdf8" font-family="sans-serif" font-size="11" font-weight="600">AWS / Azure / GCP</text>
  <!-- Benefits -->
  <text x="540" y="240" fill="#34d399" font-family="sans-serif" font-size="11">&#x2713; Cost Optimization</text>
  <text x="540" y="258" fill="#34d399" font-family="sans-serif" font-size="11">&#x2713; Auto Scaling</text>
  <text x="540" y="276" fill="#34d399" font-family="sans-serif" font-size="11">&#x2713; High Availability</text>
  <text x="540" y="294" fill="#34d399" font-family="sans-serif" font-size="11">&#x2713; Global Reach</text>
  <!-- Title -->
  <text x="400" y="370" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="18" font-weight="700">On-Premises to Cloud Migration</text>
</svg>
