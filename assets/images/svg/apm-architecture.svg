<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
  </defs>
  <rect width="800" height="320" fill="url(#bg)" rx="12"/>
  <text x="400" y="35" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="16" font-weight="700">APM Stack Architecture - Rocky Linux 9</text>
  <!-- Client -->
  <rect x="310" y="55" width="180" height="50" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="400" y="78" text-anchor="middle" fill="#fbbf24" font-family="sans-serif" font-size="12" font-weight="700">Client Browser</text>
  <text x="400" y="94" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="10">HTTP / HTTPS Request</text>
  <!-- Arrow -->
  <line x1="400" y1="105" x2="400" y2="125" stroke="#475569" stroke-width="2"/>
  <polygon points="394,123 400,133 406,123" fill="#475569"/>
  <!-- Apache -->
  <rect x="220" y="135" width="360" height="55" rx="12" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
  <circle cx="260" cy="162" r="16" fill="#38bdf8" fill-opacity="0.15" stroke="#38bdf8" stroke-width="1"/>
  <text x="260" y="167" text-anchor="middle" fill="#38bdf8" font-family="monospace" font-size="12" font-weight="700">A</text>
  <text x="310" y="158" fill="#e2e8f0" font-family="sans-serif" font-size="13" font-weight="700">Apache HTTP Server (httpd)</text>
  <text x="310" y="176" fill="#94a3b8" font-family="sans-serif" font-size="10">Port 80/443 | mod_php | Static Files</text>
  <!-- Arrow -->
  <line x1="330" y1="190" x2="330" y2="210" stroke="#475569" stroke-width="2"/>
  <polygon points="324,208 330,218 336,208" fill="#475569"/>
  <line x1="470" y1="190" x2="470" y2="210" stroke="#475569" stroke-width="2"/>
  <polygon points="464,208 470,218 476,208" fill="#475569"/>
  <!-- PHP -->
  <rect x="220" y="218" width="170" height="55" rx="12" fill="#1e293b" stroke="#818cf8" stroke-width="1.5"/>
  <circle cx="260" cy="245" r="16" fill="#818cf8" fill-opacity="0.15" stroke="#818cf8" stroke-width="1"/>
  <text x="260" y="250" text-anchor="middle" fill="#818cf8" font-family="monospace" font-size="12" font-weight="700">P</text>
  <text x="310" y="241" fill="#e2e8f0" font-family="sans-serif" font-size="13" font-weight="700">PHP</text>
  <text x="310" y="259" fill="#94a3b8" font-family="sans-serif" font-size="10">php-mysqlnd, php-gd, ...</text>
  <!-- MariaDB -->
  <rect x="410" y="218" width="170" height="55" rx="12" fill="#1e293b" stroke="#34d399" stroke-width="1.5"/>
  <circle cx="450" cy="245" r="16" fill="#34d399" fill-opacity="0.15" stroke="#34d399" stroke-width="1"/>
  <text x="450" y="250" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="12" font-weight="700">M</text>
  <text x="500" y="241" fill="#e2e8f0" font-family="sans-serif" font-size="13" font-weight="700">MariaDB</text>
  <text x="500" y="259" fill="#94a3b8" font-family="sans-serif" font-size="10">Port 3306 | InnoDB</text>
  <!-- PHP to MariaDB arrow -->
  <line x1="390" y1="245" x2="410" y2="245" stroke="#c084fc" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Firewall -->
  <rect x="630" y="135" width="140" height="138" rx="10" fill="#1e293b" stroke="#f87171" stroke-width="1.2"/>
  <text x="700" y="160" text-anchor="middle" fill="#f87171" font-family="sans-serif" font-size="12" font-weight="700">Firewall</text>
  <text x="645" y="182" fill="#34d399" font-family="sans-serif" font-size="10">&#x2713; HTTP (80)</text>
  <text x="645" y="200" fill="#34d399" font-family="sans-serif" font-size="10">&#x2713; HTTPS (443)</text>
  <text x="645" y="218" fill="#f87171" font-family="sans-serif" font-size="10">&#x2716; MySQL (3306)</text>
  <text x="645" y="236" fill="#94a3b8" font-family="sans-serif" font-size="10">SELinux: enforcing</text>
  <text x="645" y="254" fill="#94a3b8" font-family="sans-serif" font-size="10">httpd_execmem: on</text>
  <!-- OS base -->
  <rect x="220" y="288" width="360" height="25" rx="6" fill="#334155"/>
  <text x="400" y="305" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="11" font-weight="600">Rocky Linux 9 (RHEL-compatible)</text>
</svg>
