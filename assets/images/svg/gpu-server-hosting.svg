<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="gpu-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="50%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
  </defs>
  <rect width="800" height="340" fill="url(#bg)" rx="12"/>
  <text x="400" y="35" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="16" font-weight="700">TOYO Cloud GPU Server Hosting - Tokyo Data Center</text>
  <!-- GPU Card visual -->
  <rect x="30" y="60" width="300" height="180" rx="14" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
  <rect x="50" y="80" width="260" height="30" rx="6" fill="#334155"/>
  <text x="180" y="100" text-anchor="middle" fill="url(#gpu-grad)" font-family="sans-serif" font-size="14" font-weight="800">GPU INSTANCE</text>
  <!-- GPU chip visual -->
  <rect x="70" y="125" width="60" height="60" rx="8" fill="#334155" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.5"/>
  <text x="100" y="155" text-anchor="middle" fill="#38bdf8" font-family="monospace" font-size="10" font-weight="700">NVIDIA</text>
  <text x="100" y="170" text-anchor="middle" fill="#38bdf8" font-family="monospace" font-size="8">GPU</text>
  <rect x="150" y="125" width="60" height="60" rx="8" fill="#334155" stroke="#818cf8" stroke-width="1" stroke-opacity="0.5"/>
  <text x="180" y="155" text-anchor="middle" fill="#818cf8" font-family="monospace" font-size="10" font-weight="700">AMD</text>
  <text x="180" y="170" text-anchor="middle" fill="#818cf8" font-family="monospace" font-size="8">GPU</text>
  <rect x="230" y="125" width="60" height="60" rx="8" fill="#334155" stroke="#34d399" stroke-width="1" stroke-opacity="0.5"/>
  <text x="260" y="152" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="10" font-weight="700">vCPU</text>
  <text x="260" y="170" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="8">+ RAM</text>
  <!-- OS options -->
  <text x="70" y="215" fill="#94a3b8" font-family="sans-serif" font-size="10">OS: Linux / Windows</text>
  <text x="70" y="230" fill="#94a3b8" font-family="sans-serif" font-size="10">Access: SSH / Remote Desktop</text>
  <!-- Use cases -->
  <rect x="360" y="60" width="410" height="180" rx="14" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="565" y="85" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="13" font-weight="700">Use Cases</text>
  <line x1="380" y1="95" x2="750" y2="95" stroke="#334155" stroke-width="0.8"/>
  <!-- Row 1 -->
  <rect x="380" y="108" width="120" height="50" rx="8" fill="#38bdf8" fill-opacity="0.08" stroke="#38bdf8" stroke-width="0.8"/>
  <text x="440" y="130" text-anchor="middle" fill="#38bdf8" font-family="sans-serif" font-size="11" font-weight="600">Machine</text>
  <text x="440" y="146" text-anchor="middle" fill="#38bdf8" font-family="sans-serif" font-size="11" font-weight="600">Learning</text>
  <rect x="510" y="108" width="120" height="50" rx="8" fill="#818cf8" fill-opacity="0.08" stroke="#818cf8" stroke-width="0.8"/>
  <text x="570" y="130" text-anchor="middle" fill="#818cf8" font-family="sans-serif" font-size="11" font-weight="600">Deep</text>
  <text x="570" y="146" text-anchor="middle" fill="#818cf8" font-family="sans-serif" font-size="11" font-weight="600">Learning</text>
  <rect x="640" y="108" width="120" height="50" rx="8" fill="#c084fc" fill-opacity="0.08" stroke="#c084fc" stroke-width="0.8"/>
  <text x="700" y="130" text-anchor="middle" fill="#c084fc" font-family="sans-serif" font-size="11" font-weight="600">3D</text>
  <text x="700" y="146" text-anchor="middle" fill="#c084fc" font-family="sans-serif" font-size="11" font-weight="600">Rendering</text>
  <!-- Row 2 -->
  <rect x="380" y="168" width="120" height="50" rx="8" fill="#34d399" fill-opacity="0.08" stroke="#34d399" stroke-width="0.8"/>
  <text x="440" y="190" text-anchor="middle" fill="#34d399" font-family="sans-serif" font-size="11" font-weight="600">Data</text>
  <text x="440" y="206" text-anchor="middle" fill="#34d399" font-family="sans-serif" font-size="11" font-weight="600">Analytics</text>
  <rect x="510" y="168" width="120" height="50" rx="8" fill="#fb923c" fill-opacity="0.08" stroke="#fb923c" stroke-width="0.8"/>
  <text x="570" y="190" text-anchor="middle" fill="#fb923c" font-family="sans-serif" font-size="11" font-weight="600">Game</text>
  <text x="570" y="206" text-anchor="middle" fill="#fb923c" font-family="sans-serif" font-size="11" font-weight="600">Server</text>
  <rect x="640" y="168" width="120" height="50" rx="8" fill="#fbbf24" fill-opacity="0.08" stroke="#fbbf24" stroke-width="0.8"/>
  <text x="700" y="190" text-anchor="middle" fill="#fbbf24" font-family="sans-serif" font-size="11" font-weight="600">Visual</text>
  <text x="700" y="206" text-anchor="middle" fill="#fbbf24" font-family="sans-serif" font-size="11" font-weight="600">Computing</text>
  <!-- Bottom features -->
  <rect x="30" y="262" width="230" height="58" rx="10" fill="#1e293b" stroke="#38bdf8" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="145" y="285" text-anchor="middle" fill="#38bdf8" font-family="sans-serif" font-size="11" font-weight="700">Tokyo Data Center</text>
  <text x="145" y="303" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="9">高速接続・高い安定性・低遅延</text>
  <rect x="280" y="262" width="230" height="58" rx="10" fill="#1e293b" stroke="#818cf8" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="395" y="285" text-anchor="middle" fill="#818cf8" font-family="sans-serif" font-size="11" font-weight="700">IaaS Cloud Service</text>
  <text x="395" y="303" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="9">自由なソフトウェアインストール</text>
  <rect x="530" y="262" width="240" height="58" rx="10" fill="#1e293b" stroke="#34d399" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="650" y="285" text-anchor="middle" fill="#34d399" font-family="sans-serif" font-size="11" font-weight="700">Multi-layer Security</text>
  <text x="650" y="303" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="9">物理・ネットワーク・システム保護</text>
</svg>
