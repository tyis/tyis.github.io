<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
  </defs>
  <rect width="800" height="250" fill="url(#bg)" rx="12"/>
  <text x="400" y="32" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="15" font-weight="700">Windows 7 Bootable USB Creation Flow</text>
  <!-- DVD -->
  <rect x="30" y="70" width="130" height="100" rx="12" fill="#1e293b" stroke="#38bdf8" stroke-width="1.3"/>
  <text x="95" y="105" text-anchor="middle" fill="#38bdf8" font-family="sans-serif" font-size="26">&#x1F4BF;</text>
  <text x="95" y="130" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="11" font-weight="600">Windows 7 DVD</text>
  <text x="95" y="148" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="9">x:\ (source)</text>
  <!-- Arrow 1 -->
  <text x="180" y="125" fill="#475569" font-family="sans-serif" font-size="20">&#x2192;</text>
  <!-- Diskpart process -->
  <rect x="210" y="55" width="310" height="130" rx="12" fill="#1e293b" stroke="#818cf8" stroke-width="1.3"/>
  <text x="365" y="80" text-anchor="middle" fill="#818cf8" font-family="sans-serif" font-size="12" font-weight="700">diskpart (CMD)</text>
  <line x1="230" y1="90" x2="500" y2="90" stroke="#334155" stroke-width="0.8"/>
  <text x="230" y="110" fill="#94a3b8" font-family="monospace" font-size="9">list disk</text>
  <text x="340" y="110" fill="#475569" font-family="sans-serif" font-size="9">&#x2192;</text>
  <text x="360" y="110" fill="#94a3b8" font-family="monospace" font-size="9">select disk 1</text>
  <text x="230" y="128" fill="#94a3b8" font-family="monospace" font-size="9">clean</text>
  <text x="340" y="128" fill="#475569" font-family="sans-serif" font-size="9">&#x2192;</text>
  <text x="360" y="128" fill="#94a3b8" font-family="monospace" font-size="9">create partition primary</text>
  <text x="230" y="146" fill="#94a3b8" font-family="monospace" font-size="9">select partition 1</text>
  <text x="395" y="146" fill="#475569" font-family="sans-serif" font-size="9">&#x2192;</text>
  <text x="415" y="146" fill="#94a3b8" font-family="monospace" font-size="9">active</text>
  <text x="230" y="164" fill="#38bdf8" font-family="monospace" font-size="9">format fs=ntfs quick</text>
  <text x="395" y="164" fill="#475569" font-family="sans-serif" font-size="9">&#x2192;</text>
  <text x="415" y="164" fill="#94a3b8" font-family="monospace" font-size="9">assign</text>
  <text x="465" y="164" fill="#475569" font-family="sans-serif" font-size="9">&#x2192;</text>
  <text x="479" y="164" fill="#94a3b8" font-family="monospace" font-size="9">exit</text>
  <!-- Arrow 2 -->
  <text x="540" y="125" fill="#475569" font-family="sans-serif" font-size="20">&#x2192;</text>
  <!-- xcopy -->
  <rect x="565" y="75" width="100" height="45" rx="8" fill="#1e293b" stroke="#c084fc" stroke-width="1.2"/>
  <text x="615" y="98" text-anchor="middle" fill="#c084fc" font-family="monospace" font-size="10" font-weight="600">xcopy</text>
  <text x="615" y="112" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="8">x:\ y:\ /cherky</text>
  <!-- Arrow 3 -->
  <text x="678" y="100" fill="#475569" font-family="sans-serif" font-size="20">&#x2192;</text>
  <!-- USB result -->
  <rect x="700" y="70" width="75" height="100" rx="12" fill="#1e293b" stroke="#34d399" stroke-width="1.5"/>
  <text x="737" y="105" text-anchor="middle" fill="#34d399" font-family="sans-serif" font-size="26">&#x1F4BE;</text>
  <text x="737" y="130" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="10" font-weight="600">Bootable</text>
  <text x="737" y="146" text-anchor="middle" fill="#e2e8f0" font-family="sans-serif" font-size="10" font-weight="600">USB</text>
  <text x="737" y="162" text-anchor="middle" fill="#34d399" font-family="sans-serif" font-size="10">&#x2713; Ready</text>
  <!-- Requirement -->
  <rect x="30" y="200" width="745" height="35" rx="8" fill="#fbbf24" fill-opacity="0.06" stroke="#fbbf24" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="50" y="222" fill="#fbbf24" font-family="sans-serif" font-size="10" font-weight="600">&#x26A0; 必要条件:</text>
  <text x="160" y="222" fill="#94a3b8" font-family="sans-serif" font-size="10">Windows 7 or Windows Vista | USBメモリー | Windows 7 インストールDVD | 管理者権限のCMD</text>
</svg>
